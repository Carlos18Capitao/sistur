services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: sistur_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - sistur
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: sistur_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sistur
    depends_on:
      - app

  db:
    image: mysql:8.4
    container_name: sistur_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-sistur}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-sistur}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - sistur_db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - sistur
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  sistur:
    driver: bridge

volumes:
  sistur_db_data:
    driver: local
