name: Deploy to DreamHost

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, pdo_mysql, xml, curl, zip
          coverage: none

      - name: Instalar dependências PHP (produção)
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências JS e compilar assets
        run: |
          npm ci
          npm run build

      - name: Preparar chave SSH para rsync
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ams1-shared-01.dreamhost.com >> ~/.ssh/known_hosts

      - name: Sincronizar ficheiros para o servidor
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='docker' \
            --exclude='docker-compose.yml' \
            --exclude='.env' \
            --exclude='storage' \
            --exclude='bootstrap/cache' \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            ./ dh_3w7gcc@ams1-shared-01.dreamhost.com:/home/dh_3w7gcc/cc-computacao.com/

      - name: Executar comandos pós-deploy no servidor
        uses: appleboy/ssh-action@v1
        with:
          host: ams1-shared-01.dreamhost.com
          username: dh_3w7gcc
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/dh_3w7gcc/cc-computacao.com

            # Criar/actualizar .env de produção a partir dos segredos do deploy
            # Nota: GitHub Actions expande ${{ secrets.* }} antes do envio por SSH
            printf '%s\n' \
              'APP_NAME=Sistur' \
              'APP_ENV=production' \
              'APP_KEY=${{ secrets.APP_KEY }}' \
              'APP_DEBUG=false' \
              'APP_URL=https://cc-computacao.com' \
              '' \
              'APP_LOCALE=pt' \
              'APP_FALLBACK_LOCALE=en' \
              '' \
              'LOG_CHANNEL=stack' \
              'LOG_STACK=single' \
              'LOG_LEVEL=error' \
              '' \
              'DB_CONNECTION=mysql' \
              'DB_HOST=${{ secrets.PROD_DB_HOST }}' \
              'DB_PORT=${{ secrets.PROD_DB_PORT }}' \
              'DB_DATABASE=${{ secrets.PROD_DB_NAME }}' \
              'DB_USERNAME=${{ secrets.PROD_DB_USER }}' \
              'DB_PASSWORD=${{ secrets.PROD_DB_PASS }}' \
              '' \
              'SESSION_DRIVER=database' \
              'SESSION_LIFETIME=120' \
              'SESSION_ENCRYPT=false' \
              'SESSION_PATH=/' \
              'SESSION_DOMAIN=null' \
              '' \
              'CACHE_STORE=database' \
              'QUEUE_CONNECTION=database' \
              'FILESYSTEM_DISK=local' \
              '' \
              'MAIL_MAILER=log' \
              '' \
              'GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}' \
              'GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}' \
              'GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}' \
            > .env

            # Cria pastas de storage necessárias
            mkdir -p storage/framework/{sessions,views,cache}
            mkdir -p storage/logs
            mkdir -p bootstrap/cache
            chmod -R 755 storage bootstrap/cache

            # Cria symlink storage → public/storage
            php artisan storage:link --force

            # Corre migrações
            php artisan migrate --force --no-interaction

            # Limpa e reconstrói caches de produção
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            echo "Deploy concluído com sucesso."
